version: '3.8'

services:
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --node-ip=127.0.0.1
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - LIVEKIT_KEYS=devkey: secret
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

