name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint shared package
        run: pnpm --filter shared lint || echo "Lint not configured yet"
        continue-on-error: true

      - name: Type check shared package
        run: pnpm --filter shared type-check || echo "Type check not configured yet"
        continue-on-error: true

      - name: Test shared package
        run: pnpm --filter shared test

      - name: Validate package structure
        run: |
          echo "✓ Checking monorepo structure..."
          test -f package.json && echo "✓ Root package.json exists"
          test -f pnpm-workspace.yaml && echo "✓ pnpm-workspace.yaml exists"
          test -f turbo.json && echo "✓ turbo.json exists"
          test -d packages/shared && echo "✓ packages/shared exists"
          echo "✓ Monorepo structure valid"

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check if Python services exist
        id: check-services
        run: |
          if [ -d "services/voice-agent" ] && [ -f "services/voice-agent/requirements.txt" ]; then
            echo "voice_agent_exists=true" >> $GITHUB_OUTPUT
          else
            echo "voice_agent_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  services/voice-agent not yet migrated"
          fi

      - name: Install Python dependencies
        if: steps.check-services.outputs.voice_agent_exists == 'true'
        run: |
          cd services/voice-agent
          pip install -r requirements.txt
          pip install pytest pytest-asyncio black ruff

      - name: Lint Python
        if: steps.check-services.outputs.voice_agent_exists == 'true'
        run: |
          cd services/voice-agent
          black --check .
          ruff check .

      - name: Test Python
        if: steps.check-services.outputs.voice_agent_exists == 'true'
        run: |
          cd services/voice-agent
          pytest

      - name: Skip Python tests
        if: steps.check-services.outputs.voice_agent_exists == 'false'
        run: echo "✓ Python services not yet migrated - skipping tests"
